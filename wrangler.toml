name = "mail-worker"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── 自定義域名（域名需已托管在 Cloudflare）────────────────────────
# Cloudflare 會自動建立 DNS 記錄並簽發 SSL，無需手動操作
# 取消下面兩行注釋並填入你的域名即可
# [[routes]]
# pattern = "mail.yourdomain.com"
# custom_domain = true
# ─────────────────────────────────────────────────────────────────

[vars]
AUTH_KEY = "換成你的密碼"

[[kv_namespaces]]
binding = "MAIL_KV"
id = "貼上你的 KV Namespace ID"
